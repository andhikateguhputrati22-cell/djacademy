<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DJ Academy Booking System</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="favicon.ico"/>
<style>
body{margin:0;font-family:Arial;background:#0b0f17;color:#fff}
.wrap{max-width:520px;margin:auto;padding:14px}
.header{text-align:center;padding:18px}
.logo{width:160px;border-radius:14px}
.card{background:#161c2a;padding:14px;border-radius:14px;margin-top:10px;border:1px solid #273143}
h2{margin:6px 0}
.price{color:#d7eb14;font-size:24px;font-weight:800}
button{width:100%;padding:12px;border:0;border-radius:10px;background:#d7eb14;font-weight:800;margin-top:8px}
input,select{width:100%;padding:10px;margin-top:6px;border-radius:10px;border:0}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.small{font-size:12px;color:#9ca3af}
.total{margin-top:10px;color:#d7eb14;font-weight:800}
.step{display:flex;justify-content:space-between;font-size:12px;color:#9ca3af;margin:10px 0}
.active{color:#d7eb14}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
<img src="dj-logo-app.jpg" class="logo"/>
<h3>DJ Academy Booking</h3>
<div class="small">System booking padel coaching</div>
</div>

<div class="step"><span class="active">Pilih</span><span>Data</span><span>Confirm</span></div>

<div class="card">
<h2>Starter Package</h2>
<div class="price">Rp550.000</div>
<div class="small">4 Session</div>
<button onclick="pick('Starter Package',550000)">Pilih</button>
</div>

<div class="card">
<h2>Performance Package</h2>
<div class="price">Rp1.400.000</div>
<div class="small">12 Session</div>
<button onclick="pick('Performance Package',1400000)">Pilih</button>
</div>

<div class="card">
<h2>Booking Form</h2>

<input id="name" placeholder="Nama"/>
<input id="phone" placeholder="WhatsApp"/>

<div class="row">
<select id="players">
<option value="1">1 Player</option>
<option value="2">2 Player</option>
<option value="3">3 Player</option>
<option value="4">4 Player</option>
</select>

<select id="level">
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
</select>
</div>

<input id="date" type="date"/>
<input id="time" type="time"/>

<div id="info" class="total"></div>

<button onclick="send()">Kirim Booking</button>
</div>

</div>

<script>
let pkg=null,price=0;
function pick(n,p){
pkg=n;price=p;
document.getElementById("info").innerText="Selected: "+n+" - Rp"+p;
}
function send(){
let name=name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let players=document.getElementById("players").value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;
let total=price+(players-1)*50000;

let msg=`DJ ACADEMY BOOKING
Nama: ${name}
WA: ${phone}
Paket: ${pkg}
Pemain: ${players}
Tanggal: ${date}
Jam: ${time}
Total: Rp${total}`;

window.location.href="https://wa.me/62882008255252?text="+encodeURIComponent(msg);
}
</script>

</body>
</html>
